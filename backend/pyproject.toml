[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM"]

[tool.ruff.lint.per-file-ignores]
"*/tests.py" = ["E501", "N"]
"*/migrations/*" = ["E", "I", "N", "UP"]
"*/settings.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"
