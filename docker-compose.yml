services:
  db:
    image: postgres:15-alpine
    container_name: setubal_resolve_db
    environment:
      POSTGRES_DB: setubal_resolve
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: setubal_resolve_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_NAME=setubal_resolve
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend,.app.github.dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: setubal_resolve_frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents local node_modules from overwriting container's
    ports:
      - "5173:5173"
    environment:
      # Ensures Vite hot-reloading works properly inside Docker
      - CHOKIDAR_USEPOLLING=true
      # Allows Vite dev server proxy to reach backend from inside container
      - VITE_BACKEND_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data: